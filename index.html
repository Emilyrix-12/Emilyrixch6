    <body>
        <header>
        <!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majora</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; }

    .topbar {
      background: #111;
      color: #fff;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 9px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
    }

    nav { display: flex; gap: 32px; }

    nav a {
      font-size: 14px;
      color: #444;
      text-decoration: none;
      transition: color 0.15s;
    }

    nav a:hover { color: #111; }
    nav a.active { color: #111; font-weight: 500; }

    .icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icons button {
      background: none;
      border: none;
      cursor: pointer;
      color: #444;
      display: flex;
      align-items: center;
      position: relative;
      transition: color 0.15s;
    }

    .icons button:hover { color: #111; }
    .icons button svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; }

    .dot {
      position: absolute;
      top: -4px;
      right: -5px;
      width: 14px;
      height: 14px;
      background: #111;
      border-radius: 50%;
      font-size: 8px;
      color: #fff;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="topbar">Безкоштовна доставка від 1500 ₴</div>

  <header>
    <a class="logo" href="#">Majora</a>

    <nav>
      <a href="#" class="active">Новинки</a>
      <a href="#">Жінкам</a>
      <a href="#">Чоловікам</a>
      <a href="#">Знижки</a>
    </nav>

    <div class="icons">
      <button title="Пошук">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button title="Профіль">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button title="Кошик">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="dot">2</span>
      </button>
    </div>
  </header>

</body>
</html>
